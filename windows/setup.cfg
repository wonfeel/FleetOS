[flake8]
# static analysis config for bridge_server.py/fleetctl.py/windows/compute/*.py.
# Run from INSIDE windows/ (`cd windows && flake8 .` or `flake8` with no
# args) - flake8 only looks for setup.cfg/tox.ini/.flake8 in the current
# working directory (and upward toward filesystem root), never into a
# subdirectory, so `flake8 windows/` run from the repo root does NOT pick
# this file up - it silently falls back to flake8's own defaults (79-char
# lines, no E114/E116 exemption) instead of erroring, which is exactly
# the kind of thing that looks like it's linting correctly but isn't.
# Verified directly: `cd .. && flake8 windows` flags hundreds of false
# positives (79-char default, no E114/E116 exemption) that don't reproduce
# under `cd windows && flake8 .`.
max-line-length = 120
extend-ignore =
    # E114/E116: this project deliberately over-indents comments that
    # continue explaining the line above/a multi-line value (e.g. a comment
    # column-aligned with a dict value one level in) for readability - not
    # an accident flake8 should keep flagging project-wide.
    E114,
    E116
# fonts/build_font_cyrillic.py's CUSTOM glyph table is hand-authored ASCII-
# art (each Cyrillic letter's 7x6 pixel bitmap, one row per line, trailing
# spaces used for visual column alignment of the ".####." patterns) - PEP8
# reformatting that would mean touching hundreds of data lines by hand with
# real risk of silently corrupting a glyph's shape, for a one-off dev-time
# font-generation tool that isn't part of the runtime code path. Excluded
# as data, not as a pass on code style.
exclude = .git,__pycache__,sim,fonts
