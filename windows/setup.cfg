[flake8]
# static analysis config for bridge_server.py/fleetctl.py/windows/compute/*.py.
# Run with: py -m flake8 windows/ (from the repo root) or just `flake8` from windows/.
max-line-length = 120
extend-ignore =
    # E114/E116: this project deliberately over-indents comments that
    # continue explaining the line above/a multi-line value (e.g. a comment
    # column-aligned with a dict value one level in) for readability - not
    # an accident flake8 should keep flagging project-wide.
    E114,
    E116
exclude = .git,__pycache__,sim
